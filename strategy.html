            /* ---- Nova FT brand palette ---- */
            :root {
                --ink: #0e1530;
                --deep: #0b1126;
                --mint: #a7e8d9;
                --mint-deep: #5bbfa4;
                --lavender: #a6a7f5;
                --lavender-deep: #5a5bd6;
                --muted: #9097a8;
                --border: rgba(166, 167, 245, 0.18);
                --card: rgba(20, 27, 54, 0.72);
            }

            * { box-sizing: border-box; }

            .staticrypt-html { height: 100%; }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                margin: 0;
                color: #eef1f8;
                font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                background:
                    radial-gradient(1100px 620px at 12% -8%, rgba(90, 91, 214, 0.28), transparent 60%),
                    radial-gradient(1000px 640px at 92% 108%, rgba(91, 191, 164, 0.24), transparent 58%),
                    linear-gradient(160deg, var(--deep) 0%, var(--ink) 100%);
            }

            /* spinner */
            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--deep);
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid rgba(166, 167, 245, 0.25);
                border-right-color: var(--mint-deep);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border { 100% { transform: rotate(360deg); } }

            .staticrypt-page {
                min-height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
            }

            .staticrypt-form {
                position: relative;
                width: 100%;
                max-width: 400px;
                padding: 40px 38px 34px;
                text-align: center;
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 20px;
                box-shadow:
                    0 24px 60px -20px rgba(0, 0, 0, 0.65),
                    inset 0 1px 0 rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(14px);
                -webkit-backdrop-filter: blur(14px);
            }

            /* Nova logo mark */
            .nova-mark {
                width: 56px;
                height: 56px;
                margin: 0 auto 18px;
                border-radius: 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 26px;
                font-weight: 800;
                letter-spacing: -0.02em;
                color: var(--deep);
                background: linear-gradient(135deg, var(--mint) 0%, var(--lavender) 100%);
                box-shadow: 0 10px 24px -8px rgba(91, 191, 164, 0.55);
            }

            .staticrypt-instructions { margin: 0 0 22px; }

            .staticrypt-title {
                margin: 0 0 8px;
                font-size: 1.45rem;
                font-weight: 700;
                letter-spacing: -0.01em;
                background: linear-gradient(90deg, var(--mint) 0%, var(--lavender) 100%);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .staticrypt-instructions p:last-child {
                margin: 0;
                font-size: 0.92rem;
                line-height: 1.5;
                color: var(--muted);
            }

            .staticrypt-hr { display: none; }

            .staticrypt-password-container {
                position: relative;
                width: 100%;
                margin: 0 0 16px;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                width: 100%;
                background: rgba(11, 17, 38, 0.6);
                border: 1px solid var(--border);
                border-radius: 12px;
                color: #eef1f8;
                font-size: 15px;
                outline: 0;
                padding: 15px 46px 15px 16px;
                transition: border-color 0.18s, box-shadow 0.18s;
            }
            .staticrypt-form input[type="password"]::placeholder,
            .staticrypt-form input[type="text"]::placeholder { color: #6b7388; }
            .staticrypt-form input[type="password"]:focus,
            .staticrypt-form input[type="text"]:focus {
                border-color: var(--mint-deep);
                box-shadow: 0 0 0 3px rgba(91, 191, 164, 0.22);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                width: 20px;
                opacity: 0.55;
                padding: 0;
                position: absolute;
                right: 15px;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(88%) sepia(8%) saturate(400%) hue-rotate(190deg);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: flex-start;
                gap: 10px;
                margin: 0 0 20px;
                font-size: 0.88rem;
                color: var(--muted);
                cursor: pointer;
            }
            .staticrypt-remember input[type="checkbox"] {
                width: 16px;
                height: 16px;
                accent-color: var(--mint-deep);
                transform: none;
                margin: 0;
                cursor: pointer;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%;
                border: 0;
                border-radius: 12px;
                padding: 15px;
                font-size: 15px;
                font-weight: 700;
                letter-spacing: 0.02em;
                color: var(--deep);
                cursor: pointer;
                background: linear-gradient(135deg, var(--mint) 0%, var(--lavender) 100%);
                transition: filter 0.18s, transform 0.06s;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover { filter: brightness(1.06); }
            .staticrypt-form .staticrypt-decrypt-button:active { transform: translateY(1px); }
            .staticrypt-form .staticrypt-decrypt-button:focus-visible {
                outline: 2px solid var(--lavender);
                outline-offset: 2px;
            }

            .nova-footer {
                margin: 22px 0 0;
                font-size: 0.72rem;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                color: #5a6178;
            }
            .nova-footer .lock { opacity: 0.8; }

            .hidden { display: none !important; }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] { font-size: 16px; }
            }
        </style>
